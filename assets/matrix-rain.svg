    .col1 { animation: rain 3s linear infinite; }
    .col2 { animation: rain 2.5s linear infinite 0.3s; }
    .col3 { animation: rain 4s linear infinite 0.7s; }
    .col4 { animation: rain 3.2s linear infinite 1s; }
    .col5 { animation: rain 2.8s linear infinite 0.5s; }
