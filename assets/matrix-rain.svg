    .col19 { animation: rain 2.1s linear infinite 0.55s; }
    .col20 { animation: rain 3.9s linear infinite 0.75s; }
    .title { fill: #00ff41; font-family: monospace; font-weight: bold; font-size: 28px; animation: glow 2s ease-in-out infinite; text-anchor: middle; }
    .subtitle { fill: #00ff41; font-family: monospace; font-size: 12px; opacity: 0.7; animation: glow 3s ease-in-out infinite 0.5s; text-anchor: middle; }
    .sub2 { fill: #00ff41; font-family: monospace; font-size: 10px; opacity: 0.5; animation: glow 4s ease-in-out infinite 1s; text-anchor: middle; }
